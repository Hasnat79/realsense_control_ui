<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RealSense Capture Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --rec: #ff1744;
    --warm: #ff9800;
    --done: #00e676;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,229,255,0.03) 39px, rgba(0,229,255,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,229,255,0.03) 39px, rgba(0,229,255,0.03) 40px);
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px 32px;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .status-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .status-badge .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-badge.warming { border-color: var(--warm); color: var(--warm); }
  .status-badge.warming .dot { background: var(--warm); animation: blink 0.5s infinite; }
  .status-badge.recording { border-color: var(--rec); color: var(--rec); }
  .status-badge.recording .dot { background: var(--rec); animation: blink 0.8s infinite; }
  .status-badge.saving { border-color: var(--accent); color: var(--accent); }
  .status-badge.saving .dot { background: var(--accent); animation: spin-dot 1s linear infinite; }
  .status-badge.done { border-color: var(--done); color: var(--done); }
  .status-badge.done .dot { background: var(--done); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes spin-dot { to { transform: rotate(360deg); } }

  /* ── Section Labels ── */
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── Camera Cards ── */
  .cameras-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .camera-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.3s;
    position: relative;
  }
  .camera-card.active { border-color: var(--accent); }
  .camera-card.recording-active { border-color: var(--rec); }

  .camera-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), #a259ff);
    opacity: 0; transition: opacity 0.3s;
  }
  .camera-card.active::before { opacity: 1; }
  .camera-card.recording-active::before { background: linear-gradient(90deg, var(--rec), var(--warm)); opacity: 1; }

  /* Preview area */
  .preview-area {
    position: relative;
    width: 100%; aspect-ratio: 4/3;
    background: #050508;
    overflow: hidden;
  }
  .preview-img {
    width: 100%; height: 100%; object-fit: cover;
    display: block; background: #050508;
  }
  .preview-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; color: var(--muted);
    font-size: 12px;
  }
  .preview-placeholder svg { opacity: 0.3; }
  .preview-overlay {
    position: absolute; inset: 0;
    display: none;
    align-items: flex-start; justify-content: flex-end;
    padding: 12px;
  }
  .preview-overlay.visible { display: flex; }
  .rec-indicator {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--rec);
    padding: 4px 10px; border-radius: 2px;
    font-size: 10px; font-weight: 600; letter-spacing: 2px;
    color: var(--rec);
  }
  .rec-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rec); animation: blink 0.8s infinite; }

  /* Timer overlay */
  .timer-overlay {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(0,0,0,0.7);
    padding: 4px 10px; border-radius: 2px;
    font-size: 13px; font-weight: 600;
    color: var(--text); display: none;
  }
  .timer-overlay.visible { display: block; }

  /* Warmup countdown */
  .warmup-overlay {
    position: absolute; inset: 0;
    background: rgba(5,5,8,0.85);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
  }
  .warmup-overlay.visible { display: flex; }
  .warmup-count {
    font-family: var(--font-head); font-size: 80px; font-weight: 800;
    color: var(--warm); line-height: 1;
    animation: pulse-count 1s ease-in-out infinite;
  }
  @keyframes pulse-count { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  .warmup-label { font-size: 11px; letter-spacing: 3px; color: var(--warm); text-transform: uppercase; }

  /* Card body */
  .card-body { padding: 16px 20px; }

  .cam-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .cam-serial { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .cam-index {
    font-size: 10px; color: var(--muted);
    background: var(--surface2); padding: 2px 8px; border-radius: 2px;
  }

  .name-field { display: flex; align-items: center; gap: 10px; }
  .name-field label {
    font-size: 10px; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
  }
  .name-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-input:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Detect Section ── */
  .detect-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    margin-bottom: 32px;
    display: flex; align-items: center; gap: 20px;
    flex-wrap: wrap;
  }
  .detect-info { flex: 1; font-size: 12px; color: var(--muted); line-height: 1.6; }
  .detect-info strong { color: var(--text); display: block; margin-bottom: 2px; font-size: 13px; }

  /* ── Buttons ── */
  .btn {
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    border: 1px solid; border-radius: 2px; cursor: pointer;
    padding: 11px 24px;
    transition: all 0.2s;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-ghost {
    background: transparent; border-color: var(--border); color: var(--muted);
  }
  .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

  .btn-detect {
    background: transparent; border-color: var(--accent); color: var(--accent);
  }
  .btn-detect:hover:not(:disabled) { background: rgba(0,229,255,0.08); }

  .btn-record {
    background: var(--rec); border-color: var(--rec); color: #fff;
    font-size: 13px; padding: 14px 36px;
    box-shadow: 0 0 30px rgba(255,23,68,0.3);
  }
  .btn-record:hover:not(:disabled) { box-shadow: 0 0 45px rgba(255,23,68,0.5); transform: translateY(-1px); }
  .btn-record:active:not(:disabled) { transform: translateY(0); }

  .btn-stop {
    background: transparent; border-color: var(--rec); color: var(--rec);
    font-size: 13px; padding: 14px 36px;
    animation: pulse-border 2s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%,100%{ box-shadow: 0 0 0 0 rgba(255,23,68,0); }
    50%{ box-shadow: 0 0 0 6px rgba(255,23,68,0.1); }
  }
  .btn-stop:hover:not(:disabled) { background: rgba(255,23,68,0.08); }

  /* ── Controls Bar ── */
  .controls-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 16px;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 32px;
  }

  /* ── Saved Files Panel ── */
  .saved-panel {
    background: var(--surface);
    border: 1px solid var(--done);
    border-radius: 4px;
    overflow: hidden;
    animation: slide-in 0.4s ease;
  }
  @keyframes slide-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .saved-header {
    padding: 14px 20px;
    background: rgba(0, 230, 118, 0.08);
    border-bottom: 1px solid rgba(0, 230, 118, 0.2);
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--done);
  }
  .saved-check { font-size: 16px; }
  .saved-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .saved-item {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 14px;
    background: var(--surface2); border-radius: 2px;
    border-left: 2px solid var(--done);
  }
  .saved-cam-name { font-weight: 600; font-size: 13px; color: var(--done); min-width: 140px; }
  .saved-path { font-size: 11px; color: var(--muted); flex: 1; word-break: break-all; }

  /* ── Error Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--accent2);
    color: var(--accent2); padding: 12px 18px;
    border-radius: 2px; font-size: 12px;
    display: none; z-index: 100;
    animation: slide-in 0.3s ease;
  }
  .toast.visible { display: block; }

  /* ── Scan animation on detect ── */
  .scan-line {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 1.5s linear;
    pointer-events: none;
  }
  @keyframes scan { from { top: 0%; } to { top: 100%; } }

  /* ── No cameras placeholder ── */
  .no-cameras {
    text-align: center; padding: 48px;
    color: var(--muted); font-size: 13px; line-height: 2;
  }
  .no-cameras .big { font-size: 40px; display: block; margin-bottom: 8px; opacity: 0.3; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .hidden { display: none !important; }

  /* ── Frozen feed indicator ── */
  .frozen-badge {
    position: absolute; top: 12px; left: 12px;
    display: none;
    align-items: center; gap: 6px;
    background: rgba(0,0,0,0.75);
    border: 1px solid var(--warm);
    padding: 4px 10px; border-radius: 2px;
    font-size: 10px; font-weight: 600; letter-spacing: 2px;
    color: var(--warm);
    z-index: 10;
  }
  .frozen-badge.visible { display: flex; }
  .frozen-icon { font-size: 12px; }

  .camera-card.frozen { border-color: var(--warm) !important; }
  .camera-card.frozen::before {
    background: linear-gradient(90deg, var(--warm), #ff5722) !important;
    opacity: 1 !important;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">REALSENSE <span>CAPTURE</span> STUDIO</div>
    <div class="status-badge" id="statusBadge">
      <div class="dot"></div>
      <span id="statusText">IDLE</span>
    </div>
  </header>

  <!-- Detect Panel -->
  <div class="section-label">01 — Device Detection</div>
  <div class="detect-panel" id="detectPanel">
    <div class="detect-info">
      <strong>Connected Cameras</strong>
      Click detect to scan for RealSense devices and configure camera names before recording.
    </div>
    <button class="btn btn-detect" id="detectBtn" onclick="detectCameras()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Detect Cameras
    </button>
  </div>

  <!-- Camera Cards -->
  <div class="section-label">02 — Camera Configuration &amp; Preview</div>
  <div id="camerasContainer">
    <div class="no-cameras">
      <span class="big">⬡</span>
      No cameras detected yet.<br>
      Click <strong>Detect Cameras</strong> to scan for connected RealSense devices.
    </div>
  </div>

  <!-- Controls Bar -->
  <div class="controls-bar" id="controlsBar">
    <button class="btn btn-ghost" id="detectBtn2" onclick="detectCameras()">
      ↺ Re-scan
    </button>
    <button class="btn btn-record" id="recordBtn" onclick="startRecording()" disabled>
      ⬤ Start Recording
    </button>
    <button class="btn btn-stop hidden" id="stopBtn" onclick="stopRecording()">
      ■ Stop Recording
    </button>
  </div>

  <!-- Saved Files -->
  <div id="savedPanel" class="hidden"></div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = `${window.location.protocol}//${window.location.hostname}:5050/api`;

let cameras = [];
let appStatus = 'idle';
let recordingStart = null;
let timerInterval = null;
let warmupInterval = null;
let statusPollInterval = null;

// ── Freeze watchdog ────────────────────────────────────────────────────────────
// Tracks the last time each camera's <img> fired a load event (i.e. got a frame)
const lastFrameTime = {};      // serial -> timestamp ms
const FREEZE_THRESHOLD = 3500; // ms without a new frame = frozen
const FREEZE_CHECK_MS  = 1500; // how often we check
let freezeWatchdogInterval = null;

function startFreezeWatchdog() {
  if (freezeWatchdogInterval) clearInterval(freezeWatchdogInterval);
  freezeWatchdogInterval = setInterval(() => {
    if (appStatus === 'idle' || appStatus === 'done') return; // only watch when live
    const now = Date.now();
    cameras.forEach(c => {
      const last = lastFrameTime[c.serial] || 0;
      const stale = last > 0 && (now - last) > FREEZE_THRESHOLD;
      markFrozen(c.serial, stale);
      if (stale) kickStream(c.serial);
    });
  }, FREEZE_CHECK_MS);
}

function stopFreezeWatchdog() {
  clearInterval(freezeWatchdogInterval);
  freezeWatchdogInterval = null;
}

function markFrozen(serial, frozen) {
  const badge = document.getElementById(`frozen-${serial}`);
  const card  = document.getElementById(`card-${serial}`);
  if (frozen) {
    badge?.classList.add('visible');
    card?.classList.add('frozen');
  } else {
    badge?.classList.remove('visible');
    card?.classList.remove('frozen');
  }
}

function kickStream(serial) {
  // Bounce the <img> src to force the browser to re-open the MJPEG connection
  const img = document.getElementById(`img-${serial}`);
  if (!img) return;
  img.src = streamUrl(serial) + '?kick=' + Date.now();
}

// ── Utilities ──────────────────────────────────────────────────────────────────
function showToast(msg, duration=3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), duration);
}

function setStatus(s) {
  appStatus = s;
  const badge = document.getElementById('statusBadge');
  const text  = document.getElementById('statusText');
  badge.className = 'status-badge ' + s;
  const labels = { idle:'IDLE', warming:'WARMING UP', recording:'REC', saving:'SAVING', done:'SAVED' };
  text.textContent = labels[s] || s.toUpperCase();
}

// ── Detect Cameras ─────────────────────────────────────────────────────────────
async function detectCameras() {
  // Block re-scan while recording
  if (appStatus === 'warming' || appStatus === 'recording' || appStatus === 'saving') {
    showToast('Cannot re-scan while recording');
    return;
  }

  const btn  = document.getElementById('detectBtn');
  const btn2 = document.getElementById('detectBtn2');
  btn.disabled = true; btn2.disabled = true;
  btn.textContent = 'Restarting…';

  // Step 1: tear down and restart all preview pipelines on the server
  try {
    await fetch(`${API}/restart_previews`, { method: 'POST' });
  } catch(e) { /* server may not have any previews yet — that's fine */ }

  btn.textContent = 'Scanning…';

  // Step 2: detect devices (server starts fresh preview pipelines per serial)
  try {
    const res  = await fetch(`${API}/detect`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Preserve existing user-typed names across re-scans
    const existingNames = {};
    cameras.forEach(c => { existingNames[c.serial] = c.user_name; });

    cameras = data.cameras.map(c => ({
      ...c,
      user_name: existingNames[c.serial] ?? '',
    }));

    // Reset freeze state for all cameras
    cameras.forEach(c => {
      lastFrameTime[c.serial] = 0;
      markFrozen(c.serial, false);
    });

    renderCameras();
    document.getElementById('recordBtn').disabled = cameras.length === 0;
    setStatus('idle');

    // Start watchdog now that we have cameras
    if (cameras.length > 0) startFreezeWatchdog();

  } catch(e) {
    showToast('Detection failed: ' + e.message);
  } finally {
    btn.disabled = false; btn2.disabled = false;
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Detect Cameras`;
  }
}

// ── Render Camera Cards ────────────────────────────────────────────────────────
function renderCameras() {
  const container = document.getElementById('camerasContainer');
  if (cameras.length === 0) {
    container.innerHTML = `<div class="no-cameras"><span class="big">⬡</span>No RealSense devices found.<br>Check USB connection and try again.</div>`;
    return;
  }
  container.innerHTML = `<div class="cameras-grid">${cameras.map((c,i) => cameraCardHTML(c,i)).join('')}</div>`;
}

function streamUrl(serial) {
  return `${window.location.protocol}//${window.location.hostname}:5050/api/stream/${serial}`;
}

function cameraCardHTML(cam, idx) {
  return `
  <div class="camera-card" id="card-${cam.serial}">
    <div class="preview-area" id="preview-area-${cam.serial}">
      <div class="preview-placeholder" id="placeholder-${cam.serial}">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 7 16 12l7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <span>Connecting to camera…</span>
      </div>
      <img class="preview-img" id="img-${cam.serial}"
           src="${streamUrl(cam.serial)}"
           alt="live feed"
           onload="onStreamLoad('${cam.serial}')"
           onerror="onStreamError('${cam.serial}')"/>
      <div class="frozen-badge" id="frozen-${cam.serial}">
        <span class="frozen-icon">⚠</span> FROZEN
      </div>
      <div class="preview-overlay" id="rec-overlay-${cam.serial}">
        <div class="rec-indicator"><div class="rec-dot"></div> REC</div>
      </div>
      <div class="timer-overlay" id="timer-${cam.serial}">00:00</div>
      <div class="warmup-overlay" id="warmup-${cam.serial}">
        <div class="warmup-count" id="warmup-count-${cam.serial}">3</div>
        <div class="warmup-label">Warming up</div>
      </div>
    </div>
    <div class="card-body">
      <div class="cam-meta">
        <span class="cam-serial">SN: ${cam.serial}</span>
        <span class="cam-index">CAM ${String(idx+1).padStart(2,'0')}</span>
      </div>
      <div class="name-field">
        <label>Name</label>
        <input class="name-input" type="text"
          id="name-${cam.serial}"
          placeholder="e.g. topview_cam"
          value="${cam.user_name}"
          oninput="updateCamName('${cam.serial}', this.value)"
          autocomplete="off" spellcheck="false" />
      </div>
    </div>
  </div>`;
}

function onStreamLoad(serial) {
  // Record that a frame arrived — used by the freeze watchdog
  lastFrameTime[serial] = Date.now();
  markFrozen(serial, false);

  const ph = document.getElementById(`placeholder-${serial}`);
  if (ph) ph.style.display = 'none';
}

function onStreamError(serial) {
  // Don't update lastFrameTime — let the watchdog detect this as frozen
  const img = document.getElementById(`img-${serial}`);
  setTimeout(() => {
    if (img) img.src = streamUrl(serial) + '?t=' + Date.now();
  }, 1500);
}

function updateCamName(serial, val) {
  const cam = cameras.find(c => c.serial === serial);
  if (cam) cam.user_name = val;
}

// ── Recording ──────────────────────────────────────────────────────────────────
async function startRecording() {
  const payload = cameras.map(c => ({
    serial: c.serial,
    user_name: c.user_name.trim() || `cam_${c.serial.slice(-4)}`
  }));

  try {
    const res  = await fetch(`${API}/start_recording`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ cameras: payload })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('recordBtn').classList.add('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
    document.getElementById('detectBtn').disabled = true;
    document.getElementById('detectBtn2').disabled = true;
    document.getElementById('savedPanel').classList.add('hidden');
    document.querySelectorAll('.name-input').forEach(el => el.disabled = true);

    setStatus('warming');
    startWarmupCountdown();
    startFreezeWatchdog();
    pollStatus();

    cameras.forEach(c => {
      const card = document.getElementById(`card-${c.serial}`);
      if (card) card.classList.add('active');
    });

  } catch(e) {
    showToast('Failed to start: ' + e.message);
  }
}

function startWarmupCountdown() {
  let count = 3;
  cameras.forEach(c => {
    const overlay = document.getElementById(`warmup-${c.serial}`);
    if (overlay) overlay.classList.add('visible');
    const el = document.getElementById(`warmup-count-${c.serial}`);
    if (el) el.textContent = count;
  });

  warmupInterval = setInterval(() => {
    count--;
    cameras.forEach(c => {
      const el = document.getElementById(`warmup-count-${c.serial}`);
      if (el) el.textContent = Math.max(count, 0);
    });
    if (count <= 0) {
      clearInterval(warmupInterval);
      cameras.forEach(c => {
        const wo = document.getElementById(`warmup-${c.serial}`);
        if (wo) wo.classList.remove('visible');
        const ro = document.getElementById(`rec-overlay-${c.serial}`);
        if (ro) ro.classList.add('visible');
        const to = document.getElementById(`timer-${c.serial}`);
        if (to) to.classList.add('visible');
        const card = document.getElementById(`card-${c.serial}`);
        if (card) { card.classList.remove('active'); card.classList.add('recording-active'); }
      });
      recordingStart = Date.now();
      timerInterval = setInterval(updateTimers, 500);
    }
  }, 1000);
}

function updateTimers() {
  if (!recordingStart) return;
  const elapsed = Math.floor((Date.now() - recordingStart) / 1000);
  const mm = String(Math.floor(elapsed/60)).padStart(2,'0');
  const ss = String(elapsed % 60).padStart(2,'0');
  cameras.forEach(c => {
    const el = document.getElementById(`timer-${c.serial}`);
    if (el) el.textContent = `${mm}:${ss}`;
  });
}

async function stopRecording() {
  try {
    const res  = await fetch(`${API}/stop_recording`, { method: 'POST' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    setStatus('saving');
    clearInterval(timerInterval);
    clearInterval(warmupInterval);

    cameras.forEach(c => {
      const ro = document.getElementById(`rec-overlay-${c.serial}`);
      if (ro) ro.classList.remove('visible');
      const card = document.getElementById(`card-${c.serial}`);
      if (card) card.classList.remove('recording-active');
    });

    document.getElementById('stopBtn').disabled = true;

  } catch(e) {
    showToast('Failed to stop: ' + e.message);
  }
}

// ── Status Polling ─────────────────────────────────────────────────────────────
function pollStatus() {
  if (statusPollInterval) clearInterval(statusPollInterval);
  statusPollInterval = setInterval(async () => {
    try {
      const res  = await fetch(`${API}/status`);
      const data = await res.json();
      setStatus(data.status);

      if (data.status === 'done') {
        clearInterval(statusPollInterval);
        onRecordingDone(data.saved_files);
      }
    } catch(e) { /* ignore */ }
  }, 500);
}

function onRecordingDone(files) {
  document.getElementById('stopBtn').classList.add('hidden');
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('recordBtn').classList.remove('hidden');
  document.getElementById('detectBtn').disabled = false;
  document.getElementById('detectBtn2').disabled = false;
  document.querySelectorAll('.name-input').forEach(el => el.disabled = false);

  stopFreezeWatchdog();
  clearInterval(timerInterval);
  cameras.forEach(c => {
    markFrozen(c.serial, false);
    const to = document.getElementById(`timer-${c.serial}`);
    if (to) { to.classList.remove('visible'); to.textContent = '00:00'; }
  });
  recordingStart = null;

  renderSavedPanel(files);
}

function renderSavedPanel(files) {
  const panel = document.getElementById('savedPanel');
  panel.className = 'saved-panel';
  panel.innerHTML = `
    <div class="saved-header">
      <span class="saved-check">✓</span>
      Recording Saved — ${files.length} bag file${files.length !== 1 ? 's' : ''}
    </div>
    <div class="saved-list">
      ${files.map(f => `
        <div class="saved-item">
          <div class="saved-cam-name">${f.name}</div>
          <div class="saved-path">${f.bag_path}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────────
detectCameras();
</script>
</body>
</html>
